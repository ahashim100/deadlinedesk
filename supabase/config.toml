# Minimal Supabase CLI config. Set project_id to your project ref before
# running `supabase link` / `supabase functions deploy`.
project_id = "deadlinedesk"

[functions.daily-reminders]
# JWT verification is disabled because the function is invoked server-to-server
# by pg_cron with the service-role key in the Authorization header.
verify_jwt = false

[functions.weekly-digest]
verify_jwt = false
